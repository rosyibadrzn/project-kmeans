<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi K-Means Clustering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e0e0e0;
            /* background-image: repeating-linear-gradient(45deg, #e0e0e0 0px, #e0e0e0 10px, #f5f5f5 10px, #f5f5f5 20px); */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        .login-card {
            background: #ffffff;
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .login-icon {
            font-size: 4rem;
            color: #6a11cb;
            margin-bottom: 10px;
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
        }
        .btn-login {
            background: #6a11cb;
            color: #fff;
            font-weight: bold;
            border-radius: 10px;
            font-size: 1rem;
            padding: 10px;
        }
        .btn-login:hover {
            background: #5a0db8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Icon menarik -->
        <div class="login-icon">
            <i class="bi bi-bar-chart-fill"></i>
        </div>
        <!-- Judul -->
        <h1 class="login-title">Aplikasi Perhitungan<br>K-Means Clustering</h1>
        <!-- Form Login -->
        <form method="POST" action="home.html">
            <div class="mb-4">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-login w-100">Login</button>
        </form>
    </div>

    <!-- Bootstrap Icon Library -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
